server:
  port: 8080

spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true

  jackson:
    serialization:
      FAIL_ON_EMPTY_BEANS: false

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
mail:
  from: medicore.team@gmail.com

jwt:
  secret: ${JWT_SECRET}
  expiration-ms: 900000
  refresh-expiration-ms: 604800000

cors:
  allowed-origins: http://localhost:5173,http://localhost:5174,http://localhost:5175,https://medicore-app-v1.onrender.com,https://medicore-app-v1.vercel.app

app:
  frontend-url: ${FRONTEND_URL:http://localhost:5173}

razorpay:
  key-id: ${RAZORPAY_KEY_ID}
  key-secret: ${RAZORPAY_KEY_SECRET}

groq:
  api-key: ${GROQ_API_KEY}

logging:
  level:
    org.springframework: INFO
